<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Adelo Camp Life</title>
    <!-- FontAwesome للإيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- مكتبات Firebase (SDK v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            direction: rtl;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .admin-header h1 {
            font-size: 22px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .form-control {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-cancel {
            background: var(--text-muted);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }

        /* الجدول */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 14px;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-confirmed { background: #dcfce7; color: #15803d; }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            font-size: 16px;
            margin-left: 5px;
        }

        .btn-edit { color: var(--primary); }
        .btn-delete { color: var(--danger); }
        .btn-check { color: var(--success); }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1><i class="fas fa-sliders"></i> لوحة تحكم Adelo Camp Life</h1>
        <a href="index.html" target="_blank" style="text-decoration: none; color: var(--primary); font-weight: bold;">
            <i class="fas fa-external-link-alt"></i> عرض الموقع
        </a>
    </div>

    <!-- التبويبات -->
    <div class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('tripsTab', this)">
            <i class="fas fa-route"></i> إدارة الرحلات
        </button>
        <button class="tab-btn" onclick="switchTab('ordersTab', this)">
            <i class="fas fa-clipboard-list"></i> إدارة الحجوزات
        </button>
    </div>

    <!-- 1️⃣ تبويب الرحلات -->
    <div id="tripsTab" class="tab-content active">
        <div class="card">
            <h2 class="card-title" id="formTitle"><i class="fas fa-plus-circle"></i> إضافة رحلة جديدة</h2>
            <form id="tripForm" onsubmit="handleTripSubmit(event)">
                <input type="hidden" id="editingTripKey">
                <div class="form-grid">
                    <div class="form-group">
                        <label>عنوان الرحلة:</label>
                        <input type="text" id="tripTitle" class="form-control" placeholder="مثال: رحلة اكتشاف تيقزيرت" required>
                    </div>
                    <div class="form-group">
                        <label>سعر الرحلة:</label>
                        <input type="text" id="tripPrice" class="form-control" placeholder="مثال: 3500 دج" required>
                    </div>
                    <div class="form-group">
                        <label>تاريخ الانطلاق:</label>
                        <input type="text" id="tripDate" class="form-control" placeholder="مثال: 15 أوت 2026">
                    </div>
                    <div class="form-group">
                        <label>تاريخ العودة:</label>
                        <input type="text" id="tripReturnDate" class="form-control" placeholder="مثال: 18 أوت 2026">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>روابط الصور (رابط واحد في كل سطر):</label>
                    <textarea id="tripImages" class="form-control" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg" style="min-height: 80px;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>وصف وبرنامج الرحلة التفصيلي:</label>
                    <textarea id="tripDesc" class="form-control" placeholder="اكتب تفاصيل البرنامج هنا..." required></textarea>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> نشر الرحلة فوراً
                    </button>
                    <button type="button" class="btn-cancel" id="cancelBtn" onclick="resetForm()">إلغاء التعديل</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="card-title"><i class="fas fa-list"></i> قائمة الرحلات المنشورة حالياً</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>السعر</th>
                            <th>تاريخ الانطلاق</th>
                            <th>تاريخ العودة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="tripsTableBody">
                        <!-- جلب البيانات تلقائياً -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 2️⃣ تبويب الحجوزات -->
    <div id="ordersTab" class="tab-content">
        <div class="card">
            <h2 class="card-title"><i class="fas fa-users"></i> طلبات الحجز الواردة من الزبائن</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>اسم الزبون</th>
                            <th>رقم الهاتف</th>
                            <th>تاريخ الميلاد</th>
                            <th>رقم بطاقة التعريف</th>
                            <th>الرحلة المطلوبة</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <!-- جلب البيانات تلقائياً -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase Script & App Logic -->
    <script>
        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCo3-4-AO3omB1ujNmLisgUwekDqK6YSl0",
            authDomain: "adelo-camplife19.firebaseapp.com",
            databaseURL: "https://adelo-camplife19-default-rtdb.firebaseio.com",
            projectId: "adelo-camplife19",
            storageBucket: "adelo-camplife19.firebasestorage.app",
            messagingSenderId: "794248630595",
            appId: "1:794248630595:web:2a91c203d1de3e50ba9ff6",
            measurementId: "G-8GEGHHZR3C"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let tripsMap = {};

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // 🔥 الاستماع اللحظي للرحلات في Firebase
        function listenToTrips() {
            db.ref('trips').on('value', (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('tripsTableBody');
                tbody.innerHTML = '';
                tripsMap = {};

                if (!data) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: var(--text-muted);">لا توجد رحلات منشورة حالياً.</td></tr>';
                    return;
                }

                Object.keys(data).forEach(key => {
                    const trip = data[key];
                    tripsMap[key] = trip;

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${trip.title || ''}</strong></td>
                            <td>${trip.price || ''}</td>
                            <td>${trip.date || '-'}</td>
                            <td>${trip.returnDate || '-'}</td>
                            <td>
                                <button class="btn-action btn-edit" onclick="editTrip('${key}')" title="تعديل"><i class="fas fa-edit"></i></button>
                                <button class="btn-action btn-delete" onclick="deleteTrip('${key}')" title="حذف"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        // 🔥 الاستماع اللحظي لطلبات الحجز في Firebase
        function listenToOrders() {
            db.ref('orders').on('value', (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('ordersTableBody');
                tbody.innerHTML = '';

                if (!data) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: var(--text-muted);">لا توجد طلبات حجز حتى الآن.</td></tr>';
                    return;
                }

                Object.keys(data).forEach(key => {
                    const order = data[key];
                    const isConfirmed = order.status === 'confirmed';

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${order.name || ''}</strong></td>
                            <td><a href="tel:${order.phone}" style="color: var(--primary); font-weight: bold;">${order.phone || ''}</a></td>
                            <td>${order.dob || '-'}</td>
                            <td>${order.idCard || '-'}</td>
                            <td>${order.tripTitle || ''}</td>
                            <td>
                                <span class="badge ${isConfirmed ? 'badge-confirmed' : 'badge-pending'}">
                                    ${isConfirmed ? 'مؤكد' : 'قيد الانتظار'}
                                </span>
                            </td>
                            <td>
                                <button class="btn-action btn-check" onclick="toggleOrderStatus('${key}', '${order.status}')" title="تغيير الحالة">
                                    <i class="fas ${isConfirmed ? 'fa-undo' : 'fa-check-circle'}"></i>
                                </button>
                                <button class="btn-action btn-delete" onclick="deleteOrder('${key}')" title="حذف"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        // حفظ أو تعديل رحلة
        function handleTripSubmit(event) {
            event.preventDefault();

            const editingKey = document.getElementById('editingTripKey').value;
            const imagesRaw = document.getElementById('tripImages').value.trim();
            const imagesArray = imagesRaw ? imagesRaw.split('\n').map(url => url.trim()).filter(url => url !== '') : [];

            const tripData = {
                title: document.getElementById('tripTitle').value.trim(),
                price: document.getElementById('tripPrice').value.trim(),
                date: document.getElementById('tripDate').value.trim(),
                returnDate: document.getElementById('tripReturnDate').value.trim(),
                images: imagesArray,
                desc: document.getElementById('tripDesc').value.trim(),
                updatedAt: new Date().toISOString()
            };

            if (editingKey) {
                db.ref('trips/' + editingKey).update(tripData)
                    .then(() => {
                        resetForm();
                        alert('✅ تم تحديث الرحلة بنجاح!');
                    });
            } else {
                tripData.createdAt = new Date().toISOString();
                db.ref('trips').push(tripData)
                    .then(() => {
                        resetForm();
                        alert('✅ تم نشر الرحلة الجديدة بنجاح!');
                    });
            }
        }

        function editTrip(key) {
            const trip = tripsMap[key];
            if (!trip) return;

            document.getElementById('editingTripKey').value = key;
            document.getElementById('tripTitle').value = trip.title || '';
            document.getElementById('tripPrice').value = trip.price || '';
            document.getElementById('tripDate').value = trip.date || '';
            document.getElementById('tripReturnDate').value = trip.returnDate || '';
            document.getElementById('tripImages').value = (trip.images || []).join('\n');
            document.getElementById('tripDesc').value = trip.desc || '';

            document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> تعديل بيانات الرحلة';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> حفظ التعديلات';
            document.getElementById('cancelBtn').style.display = 'inline-block';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('tripForm').reset();
            document.getElementById('editingTripKey').value = '';
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة رحلة جديدة';
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-paper-plane"></i> نشر الرحلة فوراً';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        function deleteTrip(key) {
            if (confirm('هل أنت تأكد من رغبتك في حذف هذه الرحلة؟')) {
                db.ref('trips/' + key).remove();
            }
        }

        function toggleOrderStatus(key, currentStatus) {
            const newStatus = currentStatus === 'confirmed' ? 'pending' : 'confirmed';
            db.ref('orders/' + key).update({ status: newStatus });
        }

        function deleteOrder(key) {
            if (confirm('هل أنت تأكد من رغبتك في حذف طلب الحجز هذا؟')) {
                db.ref('orders/' + key).remove();
            }
        }

        // تشغيل الاستماع اللحظي للبيانات عند التحميل
        window.onload = function() {
            listenToTrips();
            listenToOrders();
        };
    </script>
</body>
</html>
